version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: ./api
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - appnet
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - appnet
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    networks:
      - appnet
    depends_on:
      api:
        condition: service_healthy

networks:
  appnet:
    driver: bridge