name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run flake8 on API
        run: |
          pip install flake8
          flake8 api/main.py --max-line-length=120 || true

      - name: Run eslint on frontend
        run: |
          cd frontend
          npm install
          npx eslint app.js --no-eslintrc -c '{"rules":{"no-unused-vars":"warn"}}' || true

      - name: Run hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
        continue-on-error: true

  test:
    runs-on: ub