name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 30

      - name: Test frontend
        run: curl -f http://localhost:3000

      - name: Test API via docker network
        run: |
          docker compose exec -T frontend wget -qO- http://api:8000/docs > /dev/null

      - name: Stop services
        run: docker compose down